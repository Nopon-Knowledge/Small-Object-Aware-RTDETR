task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

num_classes: 1
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    # NOTE:
    # Expect COCO-style files under /storage/home/402005/datasets/gwhd_2021
    #   train2017/, val2017/, annotations/instances_*.json
    img_folder: /storage/home/402005/datasets/gwhd_2021/train2017/
    ann_file: /storage/home/402005/datasets/gwhd_2021/annotations/instances_train2017.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 8
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction

val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /storage/home/402005/datasets/gwhd_2021/val2017/
    ann_file: /storage/home/402005/datasets/gwhd_2021/annotations/instances_val2017.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 8
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction

__include__: [
  '../dataset/gwhd_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/rtdetrv2_r50vd.yml',
]

output_dir: ./output/rtdetrv2_s_100e_gwhd_a40_bs24

# Single A40: disable sync_bn and reduce checkpoint overhead.
sync_bn: False
find_unused_parameters: False
use_amp: True
checkpoint_freq: 5
print_freq: 20

PResNet:
  depth: 18
  freeze_at: -1
  freeze_norm: False
  pretrained: True

HybridEncoder:
  in_channels: [128, 256, 512]
  hidden_dim: 256
  expansion: 0.5

RTDETRTransformerv2:
  num_layers: 3

epoches: 100

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm).*$'
      lr: 0.000015
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.
    -
      params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  # Linear-scaled from base lr=1e-4 at bs=16 -> lr=1.5e-4 at bs=24
  lr: 0.00015
  betas: [0.9, 0.999]
  weight_decay: 0.0001

ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 1000

lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 1000

train_dataloader:
  total_batch_size: 24
  num_workers: 8
  dataset:
    transforms:
      policy:
        epoch: 97
  collate_fn:
    scales: ~
    stop_epoch: 97

val_dataloader:
  total_batch_size: 32
  num_workers: 8

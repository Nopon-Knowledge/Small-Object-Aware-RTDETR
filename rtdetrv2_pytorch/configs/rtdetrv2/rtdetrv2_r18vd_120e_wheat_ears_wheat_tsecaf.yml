__include__: [
  '../dataset/wheat_ears_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/rtdetrv2_r50vd.yml',
]

output_dir: ./output/rtdetrv2_r18vd_120e_wheat_ears_wheat_tsecaf

sync_bn: False
find_unused_parameters: False
use_amp: False
checkpoint_freq: 5
print_freq: 20

eval_spatial_size: [1024, 1024]

PResNet:
  depth: 18
  freeze_at: -1
  freeze_norm: False
  pretrained: False

HybridEncoder:
  in_channels: [128, 256, 512]
  hidden_dim: 256
  expansion: 0.5
  wheat_fusion: True
  wheat_fusion_stages: [1]
  wheat_detail_enhance: True
  wheat_context_kernel_size: 11
  wheat_context_reduction: 4
  wheat_stats_reduction: 4

RTDETRTransformerv2:
  num_layers: 3
  num_queries: 500
  num_denoising: 100
  query_select_method: agnostic_small
  anchor_grid_size: 0.04
  query_size_prior: 8.0

RTDETRPostProcessor:
  num_top_queries: 500

epoches: 120
clip_max_norm: 0.1

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000005
    -
      params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.
  lr: 0.00005
  betas: [0.9, 0.999]
  weight_decay: 0.0001

ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 1000

lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 1000

train_dataloader:
  total_batch_size: 8
  num_workers: 8
  dataset:
    transforms:
      ops:
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [1024, 1024]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        name: stop_epoch
        epoch: 110
        ops: ['RandomPhotometricDistort']
  collate_fn:
    scales: [768, 832, 896, 960, 1024, 1024, 1024, 1088]
    stop_epoch: 110

val_dataloader:
  total_batch_size: 16
  num_workers: 8
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [1024, 1024]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}

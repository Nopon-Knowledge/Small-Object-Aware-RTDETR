task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

num_classes: 1
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    # Expected COCO-style layout under ${WHEAT_DATASETS_ROOT}/gwhd_2021.
    img_folder: ${WHEAT_DATASETS_ROOT}/gwhd_2021/train2017/
    ann_file: ${WHEAT_DATASETS_ROOT}/gwhd_2021/annotations/instances_train2017.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 8
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction

val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: ${WHEAT_DATASETS_ROOT}/gwhd_2021/val2017/
    ann_file: ${WHEAT_DATASETS_ROOT}/gwhd_2021/annotations/instances_val2017.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 8
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
